# Fly.io config for lab-tracker-worker.
# Deploy: `fly deploy` from /worker.
# Required secrets (set with `fly secrets set KEY=value`):
#   WORKER_SHARED_SECRET   shared with lab-tracker for inbound /run/:lab auth and outbound API auth
#   TRACKER_BASE_URL       e.g. https://lab-tracker.vercel.app
#   ACCESS_USERNAME        Access Labs portal login
#   ACCESS_PASSWORD        Access Labs portal password

app = "lab-tracker-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
