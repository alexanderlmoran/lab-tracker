# Fly.io config for lab-tracker-worker.
# Deploy: `fly deploy` from /worker.
# Required secrets (set with `fly secrets set KEY=value`):
#   WORKER_SHARED_SECRET   shared with lab-tracker for inbound /run/:lab auth and outbound API auth
#   TRACKER_BASE_URL       e.g. https://lab-tracker.vercel.app
#   ACCESS_USERNAME        Access Labs portal login
#   ACCESS_PASSWORD        Access Labs portal password

app = "lab-tracker-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Process groups, all from the same image:
#   app      — the HTTP worker (/run, /test, /post-test). Scale-to-zero via http_service.
#   zenoti   — the always-on Zenoti auto-login + sync loop (today + tomorrow, ~3 min).
#   tracking — pokes the app's /api/cron/refresh-tracking every ~2h (Vercel Hobby
#              caps crons at once/day; the worker has no cap). Auto-advances
#              in-transit cards to Sample Sent. See docs/PLAYBOOK.md.
#   scrape   — scrape-all loop (~1h): pulls every open + in-result-window case,
#              downloads the portal PDF, stages it (Pending Upload) for the human
#              Approve. The detection front of the pipeline.
#   pbdrain  — pb-upload-worker drain loop: posts APPROVED PDFs to PracticeBetter.
#              The PB post is gated on the human Approve click — OR the reconcile
#              engine's auto-approve for ≥90-confidence captures.
#   reconcile — closed-loop reconciliation (~3h, RECONCILE_LOOP_MS to override):
#              for every stuck Access case, cross-references PB (already posted →
#              advance to Complete Uploaded) and the portal (search → grade → ≥90
#              auto-post, <90 flag for Nadia+Alex, stale/none → keep searching).
#              The "full-proof" net for aged/forgotten cards.
# Fly supervises these as real processes (reliable logs, restart on crash), unlike
# ad-hoc `fly machine run` machines which exited immediately.
[processes]
  app = "node dist/server.js"
  zenoti = "npx tsx scripts/zenoti-auto-loop.ts"
  tracking = "npx tsx scripts/refresh-tracking-loop.ts"
  scrape = "npx tsx scripts/scrape-all.ts --loop"
  # pbdrain + reconcile touch PracticeBetter, which blocks datacenter IPs (error
  # 8000). The pb-egress wrapper brings up Tailscale (userspace) and routes ONLY
  # PB traffic through the clinic exit node. Needs Fly secrets TS_AUTHKEY +
  # TS_EXIT_NODE. The other process groups don't touch PB, so they run unwrapped.
  pbdrain = "bash scripts/pb-egress-entrypoint.sh npx tsx scripts/pb-upload-worker.ts"
  reconcile = "bash scripts/pb-egress-entrypoint.sh npx tsx scripts/reconcile.ts --patient=all --lab=all --apply --loop"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
